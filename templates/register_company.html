{% extends "base.html" %}

{% block title %}تسجيل جهة حكومية - منصة تعاون{% endblock %}

{% block content %}
<div class="hero">
    <img src="{{ url_for('serve_assets', filename='images/Logo.png') }}" alt="منصة تعاون" class="hero-logo">
    <h1>إنشاء حساب جهة حكومية</h1>
</div>
<div class="form-section container">
    <form method="POST" action="{{ url_for('register_company') }}">
        <div class="form-group">
            <label for="name">اسم الجهة *</label>
            <input type="text" id="name" name="name" required placeholder="اسم المؤسسة أو الجهة">
        </div>
        <div class="form-group">
            <label for="email">البريد الإلكتروني *</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">كلمة المرور *</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="phone">رقم الجوال</label>
            <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx">
        </div>
        <div class="form-group">
            <label for="department">القسم المطلوب</label>
            <input type="text" id="department" name="department" placeholder="القسم أو التخصص المطلوب للمتدربين">
        </div>
        <div class="form-group">
            <label for="organization_type">نوع الجهة</label>
            <select id="organization_type" name="organization_type">
                <option value="">-- اختر --</option>
                <option value="government">حكومية</option>
                <option value="private">خاصة</option>
            </select>
        </div>
        <div class="form-group">
            <label for="organization_category">تصنيف الجهة</label>
            <input type="text" id="organization_category" name="organization_category" placeholder="مثال: وزارة، شركة، مؤسسة">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">إنشاء الحساب</button>
        </div>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('login') }}">لديك حساب؟ سجّل الدخول</a>
    </div>
</div>
{% endblock %}
