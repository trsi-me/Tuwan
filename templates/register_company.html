{% extends "base.html" %}

{% block title %}تسجيل شركة/جهة حكومية - منصة تعاون{% endblock %}

{% block content %}
<div class="hero">
    <img src="{{ url_for('serve_assets', filename='images/Logo.png') }}" alt="منصة تعاون" class="hero-logo">
    <h1>إنشاء حساب شركة/جهة حكومية</h1>
</div>
<div class="form-section container">
    <form method="POST" action="{{ url_for('register_company') }}">
        <div class="form-group">
            <label for="name">اسم الشركة/الجهة *</label>
            <input type="text" id="name" name="name" required placeholder="اسم المؤسسة أو الشركة أو الجهة">
        </div>
        <div class="form-group">
            <label for="email">البريد الإلكتروني *</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">كلمة المرور *</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="phone">رقم الجوال</label>
            <input type="tel" id="phone" name="phone" placeholder="05xxxxxxxx">
        </div>
        <div class="form-group">
            <label for="department">الجهة (التخصص) *</label>
            <select id="department" name="department" required>
                <option value="">-- اختر تخصصاً من تخصصات الكلية --</option>
                {% for m in college_majors %}
                <option value="{{ m }}">{{ m }}</option>
                {% endfor %}
            </select>
            <small>قائمة موحّدة لتفادي اختلاف الصياغة بين الجهات</small>
        </div>
        <div class="form-group">
            <label for="organization_type">نوع الشركة/الجهة</label>
            <select id="organization_type" name="organization_type">
                <option value="">-- اختر --</option>
                <option value="government">حكومية</option>
                <option value="private">خاصة</option>
            </select>
        </div>
        <div class="form-group" id="ministry-group" style="display:none">
            <label for="ministry">الوزارة التابعة لها *</label>
            <select id="ministry" name="ministry">
                <option value="">-- اختر الوزارة --</option>
                {% for m in ministries %}
                <option value="{{ m }}">{{ m }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" id="category-group">
            <label for="organization_category">تصنيف الشركة/الجهة</label>
            <input type="text" id="organization_category" name="organization_category" placeholder="مثال: شركة، مؤسسة (للجهات الخاصة)">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">إنشاء الحساب</button>
        </div>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('login') }}">لديك حساب؟ سجّل الدخول</a>
    </div>
</div>
<script>
document.getElementById('organization_type').addEventListener('change', function() {
    var ministryGroup = document.getElementById('ministry-group');
    var categoryGroup = document.getElementById('category-group');
    if (this.value === 'government') {
        ministryGroup.style.display = 'block';
        ministryGroup.querySelector('#ministry').required = true;
        categoryGroup.querySelector('input').placeholder = 'اسم الجهة أو الإدارة';
    } else {
        ministryGroup.style.display = 'none';
        ministryGroup.querySelector('#ministry').required = false;
        categoryGroup.querySelector('input').placeholder = 'مثال: شركة، مؤسسة (للجهات الخاصة)';
    }
});
</script>
{% endblock %}
